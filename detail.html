<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>技能详情 - ClawHub-CN</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121c2f;
      --panel-2: #1b2842;
      --text: #e8edf7;
      --sub: #9eb0cf;
      --brand: #56b6ff;
      --brand-2: #7cf7d4;
      --line: #263756;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 700px at -5% -10%, #1a2d4f 0%, transparent 60%),
        radial-gradient(900px 600px at 100% 0%, #16384d 0%, transparent 55%),
        var(--bg);
      min-height: 100vh;
    }

    .container {
      width: min(1080px, 92vw);
      margin: 28px auto 54px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      padding: 20px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .btn {
      height: 40px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .btn-primary {
      border: none;
      background: linear-gradient(120deg, var(--brand), var(--brand-2));
      color: #06263d;
      font-weight: 700;
    }

    .title {
      margin: 0;
      font-size: 30px;
      line-height: 1.25;
    }

    .slug {
      margin-top: 8px;
      color: var(--sub);
      word-break: break-all;
      font-size: 13px;
    }

    .summary {
      margin: 12px 0 0;
      color: #d6e0f2;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .meta {
      margin-top: 14px;
      color: var(--sub);
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 14px;
    }

    .meta a {
      color: var(--brand);
      text-decoration: none;
    }
    .meta a:hover { text-decoration: underline; }

    .stats {
      margin-top: 16px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .stat {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      padding: 10px;
    }
    .k { color: var(--sub); font-size: 12px; }
    .v { margin-top: 6px; font-size: 18px; font-weight: 700; }

    .section {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      padding: 16px;
    }
    .section h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .mono {
      background: #0b172b;
      border: 1px solid #263b62;
      border-radius: 10px;
      padding: 12px;
      color: #d5def0;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
      font-family: Consolas, "SFMono-Regular", Menlo, Monaco, monospace;
      font-size: 13px;
      line-height: 1.6;
      margin: 0;
    }

    .loading,
    .error {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 16px;
      color: var(--sub);
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading" class="loading">正在加载详情...</div>
    <div id="error" class="error" hidden></div>
    <main id="app" hidden></main>
  </div>

  <script>
    const API_BASE = "https://wry-manatee-359.convex.site/api/v1/skills/";
    const DOWNLOAD_API = "https://wry-manatee-359.convex.site/api/v1/download?slug=";
    const SOURCE_LIST = "https://clawhub.ai/skills?sort=downloads";
    const CLAWHUB_BASE = "https://clawhub.ai";

    const el = {
      loading: document.getElementById("loading"),
      error: document.getElementById("error"),
      app: document.getElementById("app")
    };

    function q(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatNum(v) {
      return Number(v || 0).toLocaleString("en-US");
    }

    function formatTime(ms) {
      if (!ms) return "-";
      return new Date(ms).toLocaleString("zh-CN", { hour12: false });
    }

    function buildOfficialDetailUrl(ownerHandle, slug) {
      if (!slug) return CLAWHUB_BASE;
      if (!ownerHandle) return CLAWHUB_BASE;
      return `${CLAWHUB_BASE}/${encodeURIComponent(ownerHandle)}/${encodeURIComponent(slug)}`;
    }

    function render(data, slug) {
      const skill = data.skill || {};
      const latest = data.latestVersion || {};
      const owner = data.owner || {};
      const safeSlug = encodeURIComponent(slug);
      const downloadUrl = `${DOWNLOAD_API}${safeSlug}`;
      const officialDetailUrl = buildOfficialDetailUrl(owner.handle, slug);

      document.title = `${skill.displayName || slug} - ClawHub-CN`;
      el.loading.hidden = true;
      el.error.hidden = true;
      el.app.hidden = false;

      el.app.innerHTML = `
        <section class="card">
          <div class="topbar">
            <a class="btn" href="./index.html">返回列表</a>
            <a class="btn btn-primary" href="${downloadUrl}" target="_blank" rel="noopener noreferrer">下载 ZIP（原地址）</a>
          </div>

          <h1 class="title">${escapeHtml(skill.displayName || slug)}</h1>
          <div class="slug">/${escapeHtml(slug)}</div>
          <p class="summary">${escapeHtml(skill.summary || "")}</p>

          <div class="meta">
            <span>作者：${owner.handle ? "@" + escapeHtml(owner.handle) : "-"}</span>
            <span>当前版本：v${escapeHtml(latest.version || "-")}</span>
            <span>更新：${escapeHtml(formatTime(skill.updatedAt))}</span>
            <a href="${officialDetailUrl}" target="_blank" rel="noopener noreferrer">原站详情</a>
            <a href="${SOURCE_LIST}" target="_blank" rel="noopener noreferrer">原站榜单</a>
          </div>

          <div class="stats">
            <div class="stat"><div class="k">下载量</div><div class="v">${formatNum(skill.stats?.downloads)}</div></div>
            <div class="stat"><div class="k">星标</div><div class="v">${formatNum(skill.stats?.stars)}</div></div>
            <div class="stat"><div class="k">当前安装</div><div class="v">${formatNum(skill.stats?.installsCurrent)}</div></div>
            <div class="stat"><div class="k">总安装</div><div class="v">${formatNum(skill.stats?.installsAllTime)}</div></div>
            <div class="stat"><div class="k">版本数</div><div class="v">${formatNum(skill.stats?.versions)}</div></div>
            <div class="stat"><div class="k">评论数</div><div class="v">${formatNum(skill.stats?.comments)}</div></div>
          </div>
        </section>

        <section class="section">
          <h2>更新日志（原内容）</h2>
          <pre class="mono">${escapeHtml(latest.changelog || "暂无更新日志")}</pre>
        </section>
      `;
    }

    async function init() {
      const slug = (q("slug") || "").trim();
      if (!slug) {
        el.loading.hidden = true;
        el.error.hidden = false;
        el.error.innerHTML = '缺少参数：`slug`。请从列表页点击“详情”进入。';
        return;
      }

      try {
        const url = API_BASE + encodeURIComponent(slug);
        const res = await fetch(url, { headers: { Accept: "application/json" } });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        if (!data || !data.skill) throw new Error("详情数据为空");
        render(data, slug);
      } catch (err) {
        el.loading.hidden = true;
        el.error.hidden = false;
        el.error.textContent = "加载详情失败：" + (err && err.message ? err.message : String(err));
      }
    }

    init();
  </script>
</body>
</html>
